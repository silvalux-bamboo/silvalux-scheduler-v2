<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHED.SYS v3</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --green:#00ff88;
  --amber:#ffd400;
  --cyan:#00f0ff;
  --red:#ff4455;
  --bg:#050505;
}

body{
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:var(--bg);
  color:var(--green);
  font-weight:600;
  letter-spacing:0.5px;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0 1px, transparent 1px 3px);
  pointer-events:none;
}

.neon-green{
  color:var(--green);
  text-shadow:0 0 5px var(--green),0 0 15px var(--green),0 0 30px var(--green);
}

.container{max-width:800px;margin:auto;padding:20px;}

h1{text-align:center;margin-bottom:10px}

button{
  background:none;
  border:1px solid var(--green);
  color:var(--green);
  padding:8px;
  cursor:pointer;
}

button:hover{
  box-shadow:0 0 10px var(--green);
}

input{
  width:100%;
  background:black;
  border:1px solid var(--green);
  color:var(--green);
  padding:6px;
}

.item{
  border:1px solid var(--green);
  padding:10px;
  margin:5px 0;
}

.done{
  opacity:0.4;
  text-decoration:line-through;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="neon-green">█ SCHED.SYS █</h1>

<div class="top-bar">
<button onclick="prevDay()">◀</button>
<div id="date"></div>
<button onclick="nextDay()">▶</button>
</div>

<input id="title" placeholder="일정 입력">
<button onclick="add()">ADD</button>

<hr>

<div id="list"></div>

<hr>

<button onclick="exportData()">EXPORT</button>
<input type="file" onchange="importData(event)">

</div>

<script>
let data = JSON.parse(localStorage.getItem('sched')||'{}');
let date = new Date();

function key(){
  return date.toISOString().slice(0,10);
}

function render(){
  document.getElementById('date').innerText = key();
  let list = document.getElementById('list');
  list.innerHTML="";

  (data[key()]||[]).forEach((d,i)=>{
    let div=document.createElement('div');
    div.className="item"+(d.done?" done":"");
    div.innerHTML=`
      ${d.title}
      <button onclick="toggle(${i})">✔</button>
      <button onclick="del(${i})">X</button>
    `;
    list.appendChild(div);
  });

  localStorage.setItem('sched',JSON.stringify(data));
}

function add(){
  let t=document.getElementById('title').value;
  if(!t)return;
  if(!data[key()])data[key()]=[];
  data[key()].push({title:t,done:false});
  document.getElementById('title').value="";
  render();
}

function toggle(i){
  data[key()][i].done=!data[key()][i].done;
  render();
}

function del(i){
  data[key()].splice(i,1);
  render();
}

function prevDay(){
  date.setDate(date.getDate()-1);
  render();
}

function nextDay(){
  date.setDate(date.getDate()+1);
  render();
}

function exportData(){
  let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download="sched_backup.json";
  a.click();
}

function importData(e){
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=function(){
    data=JSON.parse(reader.result);
    render();
  }
  reader.readAsText(file);
}

render();
</script>

</body>
</html>
